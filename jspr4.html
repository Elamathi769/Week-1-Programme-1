<!DOCTYPE html>
<html>
<head>
<title>Student Attendance Management System</title>

<style>

/* College Campus Background */

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-image: url("https://images.unsplash.com/photo-1562774053-701939374585");
    background-size: cover;
    background-position: center;
}

/* Overlay */

.overlay{
    height:100vh;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Main Box */

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    text-align:center;
    box-shadow:0 0 15px black;
}

/* Heading */

h1{
    color:#0a2a66;
}

/* Input box */

input{
    width:80%;
    padding:8px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid gray;
}

/* Button */

button{
    margin-top:15px;
    padding:10px 20px;
    background:#0a2a66;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:green;
    cursor:pointer;
}

/* Result */

#result{
    margin-top:20px;
    font-size:20px;
    color:#333;
}

</style>

<script>

function convertToWords(){

var num = document.getElementById("num").value;

/* Validation – digits only */

if(!/^[0-9]+$/.test(num)){
alert("Enter digits only (0–999)");
return;
}

/* Validation – max 3 digits */

if(num.length > 3){
alert("Only numbers from 0 to 999 are allowed");
return;
}

var ones=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine"];

var teens=["Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];

var tens=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];

num=parseInt(num);

if(num==0){
document.getElementById("result").innerHTML="In Words: Zero";
return;
}

var word="";

/* Hundreds */

if(num>=100){
word+=ones[Math.floor(num/100)]+" Hundred ";
num=num%100;
}

/* Teens */

if(num>=10 && num<=19){
word+=teens[num-10];
}

/* Tens */

else if(num>=20){
word+=tens[Math.floor(num/10)]+" ";
num=num%10;
}

/* Ones */

if(num>0 && num<10){
word+=ones[num];
}

document.getElementById("result").innerHTML="In Words: "+word;

}

</script>

</head>

<body>

<div class="overlay">

<div class="container">

<h1>Student Attendance System</h1>

<h3>Number to Words (0–999)</h3>

<input type="text" id="num" placeholder="Enter number">

<br>

<button onclick="convertToWords()">Convert</button>

<h3 id="result"></h3>

</div>

</div>

</body>
</html>
